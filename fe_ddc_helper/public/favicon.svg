<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Console Ivory rounded square background — pops on dark browser chrome -->
  <rect width="64" height="64" rx="14" fill="#f5f5f5"/>

  <!-- Back page (offset behind, muted teal) -->
  <rect x="14" y="18" width="24" height="30" rx="3" fill="#1a5f70" fill-opacity="0.35"/>

  <!-- Front page (Steady Teal, sRGB approximation of oklch(0.45 0.085 224.283)) -->
  <rect x="24" y="12" width="26" height="32" rx="3" fill="#1a5f70"/>

  <!-- "Text lines" carved into the front page — ivory cutouts on the teal fill -->
  <rect x="28" y="18" width="14" height="2" rx="1" fill="#f5f5f5"/>
  <rect x="28" y="24" width="18" height="2" rx="1" fill="#f5f5f5"/>
  <rect x="28" y="30" width="10" height="2" rx="1" fill="#f5f5f5"/>
</svg>
